renderer:
{
    resolution = { width = 800; height = 600; };
    samples = 64;
};

camera:
{
    position = { x = 0.0; y = 3.0; z = -8.0; };
    fieldOfView = 60.0;
};

materials:
{
    lambertians = (
        { name = "floor"; color = { r = 200; g = 200; b = 200; }; },
        { name = "mid"; color = { r = 180; g = 120; b = 120; }; }
    );
};

primitives:
{
    planes = (
        { position = { x = 0.0; y = -1.0; z = 0.0; }; material = "floor"; }
    );

    spheres = (
        { position = { x = -2.0; y = 0.8; z = 3.0; }; r = 0.6; material = "mid"; },
        { position = { x = 0.0; y = 0.7; z = 2.0; }; r = 0.8; material = "mid"; },
        { position = { x = 2.0; y = 0.6; z = 3.5; }; r = 0.5; material = "mid"; }
    );
};

lights:
{
    ambient = 0.03;

    pointlight = (
        { intensity = 1.0; position = { x = -4.0; y = 3.0; z = -1.0; }; color = { r = 255; g = 120; b = 120; }; },
        { intensity = 1.0; position = { x = 4.0; y = 3.0; z = -1.0; }; color = { r = 120; g = 255; b = 200; }; },
        { intensity = 0.8; position = { x = 0.0; y = 5.0; z = -3.0; }; color = { r = 200; g = 200; b = 255; }; }
    );
};
