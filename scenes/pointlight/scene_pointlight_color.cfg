renderer:
{
    resolution = { width = 500; height = 350; };
    samples = 32;
};

camera:
{
    position = { x = 0.0; y = 2.0; z = -7.0; };
    fieldOfView = 70.0;
};

materials:
{
    lambertians = (
        { name = "white"; color = { r = 220; g = 220; b = 220; }; },
        { name = "sphereA"; color = { r = 100; g = 100; b = 255; }; },
        { name = "sphereB"; color = { r = 255; g = 180; b = 100; }; }
    );
};

primitives:
{
    spheres = (
        { position = { x = -1.5; y = 0.8; z = 2.5; }; r = 0.8; material = "sphereA"; },
        { position = { x = 1.5; y = 0.6; z = 3.0; }; r = 0.6; material = "sphereB"; }
    );

    planes = (
        { position = { x = 0.0; y = -1.0; z = 0.0; }; material = "white"; }
    );
};

lights:
{
    ambient = 0.02;

    pointlight = (
        { intensity = 1.5; position = { x = -2.0; y = 3.0; z = -1.0; }; color = { r = 100; g = 150; b = 255; }; },
        { intensity = 1.0; position = { x = 2.5; y = 2.0; z = 0.0; }; color = { r = 255; g = 200; b = 100; }; }
    );
};
