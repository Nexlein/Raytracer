renderer:
{
    resolution = { width = 700; height = 450; };
    samples = 128; # higher samples to appreciate softening
};

camera:
{
    position = { x = 0.0; y = 2.5; z = -8.0; };
};

materials:
{
    lambertians = (
        { name = "floor"; color = { r = 200; g = 200; b = 200; }; },
        { name = "obj"; color = { r = 80; g = 160; b = 200; }; }
    );
};

primitives:
{
    spheres = (
        { position = { x = 0.0; y = 0.8; z = 2.5; }; r = 0.9; material = "obj"; }
    );

    planes = (
        { position = { x = 0.0; y = -1.0; z = 0.0; }; material = "floor"; }
    );
};

lights:
{
    ambient = 0.01;

    # Simulate area/soft shadow by giving radius > 0 and using many samples
    pointlight = (
        {
            intensity = 2.0;
            position = { x = 1.5; y = 4.0; z = -1.0; };
            color = { r = 255; g = 240; b = 220; };
            radius = 1.2; # area-like sphere
        }
    );
};
