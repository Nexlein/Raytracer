renderer:
{
    resolution = { width = 600; height = 400; };
    samples = 24;
};

camera:
{
    position = { x = 0.0; y = 2.0; z = -6.0; };
};

materials:
{
    lambertians = (
        { name = "mat"; color = { r = 200; g = 200; b = 200; }; }
    );
};

primitives:
{
    spheres = (
        { position = { x = 0.0; y = 0.7; z = 2.5; }; r = 0.9; material = "mat"; }
    );

    planes = (
        { position = { x = 0.0; y = -1.0; z = 0.0; }; material = "mat"; }
    );
};

lights:
{
    ambient = 0.01;

    pointlight = (
        {
            intensity = 6.0;
            position = { x = 0.0; y = 4.0; z = 0.0; };
            color = { r = 255; g = 255; b = 255; };
            constant_attenuation = 1.0;
            linear_attenuation = 0.5;    # strong linear falloff
            quadratic_attenuation = 0.2; # strong quadratic falloff
        }
    );
};
