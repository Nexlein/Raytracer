renderer:
{
    resolution = { width = 500; height = 350; };
    samples = 32;
};

camera:
{
    position = { x = 0.0; y = 2.5; z = -6.0; };
};

materials:
{
    lambertians = (
        { name = "floor"; color = { r = 160; g = 160; b = 160; }; },
        { name = "obj"; color = { r = 120; g = 200; b = 120; }; }
    );
};

primitives:
{
    planes = (
        { position = { x = 0.0; y = -1.0; z = 0.0; }; material = "floor"; }
    );

    spheres = (
        { position = { x = 0.0; y = 0.6; z = 2.0; }; r = 0.6; material = "obj"; }
    );
};

lights:
{
    ambient = 0.02;

    pointlight = (
        {
            intensity = 3.0;
            position = { x = 0.0; y = 3.0; z = 0.0; };
            color = { r = 255; g = 230; b = 200; };
            radius = 2.5; # small radius - light stops beyond this
        }
    );
};
