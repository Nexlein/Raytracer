# ============================================================
#  japanese_temple_night.cfg
#  Paysage : temple japonais de nuit, allée de lanternes
#  Ambiance : lumières chaudes orangées vs lune bleue froide
# ============================================================

renderer:
{
    resolution = { width = 1280; height = 720; };
    samples = 64;
};

camera:
{
    position    = { x = 0.0; y = 2.5; z = -8.0; };
    fieldOfView = 65.0;
};

# ------------------------------------------------------------
#  Matériaux
# ------------------------------------------------------------
materials:
{
    lambertians = (

        # Sol — dalles de pierre sombre, légèrement bleutées par la lune
        { name = "stone_floor";   color = { r = 55;  g = 55;  b = 70;  }; },

        # Colonnes — bois laqué rouge sombre
        { name = "pillar_red";    color = { r = 120; g = 30;  b = 20;  }; },

        # Mur de fond du temple — bois noir vieilli
        { name = "temple_wall";   color = { r = 30;  g = 25;  b = 25;  }; },

        # Toiture — tuiles grises-bleutées
        { name = "roof_tile";     color = { r = 60;  g = 65;  b = 80;  }; },

        # Lanternes — papier blanc translucide (réfléchit la lumière interne)
        { name = "lantern_paper"; color = { r = 255; g = 240; b = 200; }; },

        # Socles des lanternes — pierre grise
        { name = "lantern_base";  color = { r = 90;  g = 88;  b = 85;  }; },

        # Escalier — pierre claire usée
        { name = "stair_stone";   color = { r = 130; g = 125; b = 115; }; },

        # Lune — disque blanc bleuté lointain
        { name = "moon_disc";     color = { r = 210; g = 225; b = 255; }; },

        # Arbres — feuillage sombre, silhouette de nuit
        { name = "foliage_dark";  color = { r = 15;  g = 30;  b = 20;  }; },

        # Troncs — écorce brun foncé
        { name = "bark";          color = { r = 40;  g = 28;  b = 18;  }; }
    );
};

# ------------------------------------------------------------
#  Géométrie
# ------------------------------------------------------------
primitives:
{
    planes = (
        # Sol principal — dalles de pierre
        {
            position = { x = 0.0; y = -1.0; z = 0.0; };
            material = "stone_floor";
        }
    );

    spheres = (

        # ============================================================
        #  LANTERNES — 6 sphères en papier blanc sur l'allée
        #  Placées en deux rangées symétriques (gauche / droite)
        #  Chaque lanterne a son pointlight associé dans lights{}
        # ============================================================

        # Lanterne G1 — avant gauche
        { position = { x = -2.2; y = 0.8; z = -1.0; }; r = 0.30; material = "lantern_paper"; },
        # Lanterne D1 — avant droite
        { position = { x =  2.2; y = 0.8; z = -1.0; }; r = 0.30; material = "lantern_paper"; },

        # Lanterne G2 — milieu gauche
        { position = { x = -2.2; y = 0.9; z =  2.5; }; r = 0.30; material = "lantern_paper"; },
        # Lanterne D2 — milieu droite
        { position = { x =  2.2; y = 0.9; z =  2.5; }; r = 0.30; material = "lantern_paper"; },

        # Lanterne G3 — fond gauche
        { position = { x = -2.2; y = 1.0; z =  6.0; }; r = 0.30; material = "lantern_paper"; },
        # Lanterne D3 — fond droite
        { position = { x =  2.2; y = 1.0; z =  6.0; }; r = 0.30; material = "lantern_paper"; },

        # ============================================================
        #  SOCLES DES LANTERNES — petits cylindres sphériques bas
        # ============================================================

        { position = { x = -2.2; y = -0.65; z = -1.0; }; r = 0.18; material = "lantern_base"; },
        { position = { x =  2.2; y = -0.65; z = -1.0; }; r = 0.18; material = "lantern_base"; },
        { position = { x = -2.2; y = -0.65; z =  2.5; }; r = 0.18; material = "lantern_base"; },
        { position = { x =  2.2; y = -0.65; z =  2.5; }; r = 0.18; material = "lantern_base"; },
        { position = { x = -2.2; y = -0.65; z =  6.0; }; r = 0.18; material = "lantern_base"; },
        { position = { x =  2.2; y = -0.65; z =  6.0; }; r = 0.18; material = "lantern_base"; },

        # ============================================================
        #  COLONNES DU TEMPLE — piliers laqués rouge sombre
        #  Grandes sphères très aplaties pour simuler des colonnes
        # ============================================================

        { position = { x = -3.5; y =  1.5; z =  9.0; }; r = 0.45; material = "pillar_red"; },
        { position = { x =  3.5; y =  1.5; z =  9.0; }; r = 0.45; material = "pillar_red"; },
        { position = { x = -3.5; y =  1.5; z = 10.5; }; r = 0.45; material = "pillar_red"; },
        { position = { x =  3.5; y =  1.5; z = 10.5; }; r = 0.45; material = "pillar_red"; },

        # ============================================================
        #  FAÇADE DU TEMPLE — grande sphère de fond plate
        # ============================================================

        { position = { x =  0.0; y =  2.0; z = 18.0; }; r = 9.0; material = "temple_wall"; },

        # Toiture — sphère large et haute au-dessus de la façade
        { position = { x =  0.0; y = 10.0; z = 16.0; }; r = 7.5; material = "roof_tile"; },

        # ============================================================
        #  ESCALIER D'APPROCHE — marches simulées par sphères plates
        # ============================================================

        { position = { x =  0.0; y = -1.10; z =  7.5; }; r = 1.8; material = "stair_stone"; },
        { position = { x =  0.0; y = -1.20; z =  8.4; }; r = 1.8; material = "stair_stone"; },

        # ============================================================
        #  ARBRES — silhouettes de cèdres japonais, arrière-plan
        # ============================================================

        # Feuillages (sphères hautes)
        { position = { x = -7.0; y =  3.5; z =  5.0; }; r = 2.0; material = "foliage_dark"; },
        { position = { x =  7.0; y =  3.0; z =  5.0; }; r = 1.8; material = "foliage_dark"; },
        { position = { x = -8.5; y =  4.0; z = 10.0; }; r = 2.5; material = "foliage_dark"; },
        { position = { x =  8.0; y =  3.5; z = 10.0; }; r = 2.2; material = "foliage_dark"; },

        # Troncs (petites sphères basses)
        { position = { x = -7.0; y = -0.5; z =  5.0; }; r = 0.25; material = "bark"; },
        { position = { x =  7.0; y = -0.5; z =  5.0; }; r = 0.25; material = "bark"; },
        { position = { x = -8.5; y = -0.5; z = 10.0; }; r = 0.30; material = "bark"; },
        { position = { x =  8.0; y = -0.5; z = 10.0; }; r = 0.28; material = "bark"; },

        # ============================================================
        #  LUNE — disque lointain en haut à droite
        # ============================================================

        { position = { x = 9.0; y = 9.0; z = 50.0; }; r = 3.5; material = "moon_disc"; }
    );
};

# ------------------------------------------------------------
#  Lumières
# ------------------------------------------------------------
lights:
{
    # Ambiant quasi nul — nuit profonde, seules les lanternes éclairent
    ambient = 0.015;

    pointlight = (

        # ============================================================
        #  6 LANTERNES — chacune centrée sur sa sphère de papier
        #  Couleur orange-chaud, atténuation forte = halo net et local
        #  radius = 6.0 : la lumière s'éteint à 6 unités (pas de fuite)
        # ============================================================

        # Lanterne G1
        {
            intensity = 1.8;
            position  = { x = -2.2; y = 0.8; z = -1.0; };
            color     = { r = 255; g = 160; b = 60; };
            constant_attenuation  = 1.0;
            linear_attenuation    = 0.18;
            quadratic_attenuation = 0.08;
            radius = 6.0;
        },

        # Lanterne D1
        {
            intensity = 1.8;
            position  = { x =  2.2; y = 0.8; z = -1.0; };
            color     = { r = 255; g = 155; b = 55; };
            constant_attenuation  = 1.0;
            linear_attenuation    = 0.18;
            quadratic_attenuation = 0.08;
            radius = 6.0;
        },

        # Lanterne G2
        {
            intensity = 1.8;
            position  = { x = -2.2; y = 0.9; z =  2.5; };
            color     = { r = 255; g = 165; b = 65; };
            constant_attenuation  = 1.0;
            linear_attenuation    = 0.18;
            quadratic_attenuation = 0.08;
            radius = 6.0;
        },

        # Lanterne D2
        {
            intensity = 1.8;
            position  = { x =  2.2; y = 0.9; z =  2.5; };
            color     = { r = 255; g = 150; b = 50; };
            constant_attenuation  = 1.0;
            linear_attenuation    = 0.18;
            quadratic_attenuation = 0.08;
            radius = 6.0;
        },

        # Lanterne G3
        {
            intensity = 1.8;
            position  = { x = -2.2; y = 1.0; z =  6.0; };
            color     = { r = 255; g = 158; b = 58; };
            constant_attenuation  = 1.0;
            linear_attenuation    = 0.18;
            quadratic_attenuation = 0.08;
            radius = 6.0;
        },

        # Lanterne D3
        {
            intensity = 1.8;
            position  = { x =  2.2; y = 1.0; z =  6.0; };
            color     = { r = 255; g = 162; b = 62; };
            constant_attenuation  = 1.0;
            linear_attenuation    = 0.18;
            quadratic_attenuation = 0.08;
            radius = 6.0;
        },

        # ============================================================
        #  LUNE — lumière froide, douce et très large
        #  Éclaire toute la scène avec une teinte bleutée uniforme
        #  Atténuation très faible = lumière "infinie" de la lune
        # ============================================================

        {
            intensity = 0.35;
            position  = { x = 9.0; y = 12.0; z = 30.0; };
            color     = { r = 180; g = 205; b = 255; };
            constant_attenuation  = 1.0;
            linear_attenuation    = 0.005;
            quadratic_attenuation = 0.001;
        },

        # ============================================================
        #  FILL INDIRECT — très faible lueur orange de fond
        #  Simule la lumière des lanternes qui rebondit sur le sol
        # ============================================================

        {
            intensity = 0.25;
            position  = { x =  0.0; y = -0.5; z =  3.0; };
            color     = { r = 255; g = 140; b = 60; };
            constant_attenuation  = 1.0;
            linear_attenuation    = 0.06;
            quadratic_attenuation = 0.012;
        }
    );
};
