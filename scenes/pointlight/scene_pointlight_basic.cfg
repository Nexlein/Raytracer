renderer:
{
    resolution = { width = 400; height = 300; };
    samples = 16;
    maxDepth = 5;
};

camera:
{
    position = { x = 0.0; y = 1.5; z = -6.0; };
    fieldOfView = 60.0;
};

materials:
{
    lambertians = (
        { name = "floor"; color = { r = 200; g = 200; b = 200; }; },
        { name = "ball"; color = { r = 180; g = 50; b = 50; }; }
    );
};

primitives:
{
    planes = (
        { position = { x = 0.0; y = -1.0; z = 0.0; }; material = "floor"; }
    );

    spheres = (
        { position = { x = 0.0; y = 0.5; z = 2.0; }; r = 0.8; material = "ball"; }
    );
};

lights:
{
    ambient = 0.05;

    pointlight = (
        {
            intensity = 1.2;
            position = { x = 2.0; y = 3.0; z = -1.0; };
            color = { r = 255; g = 255; b = 255; };
        }
    );
};
