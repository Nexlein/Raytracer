# ============================================================
#  desert_sunset.cfg
#  Paysage : désert au coucher de soleil
#  Deux sphères-rochers, dunes planes, soleil rasant + lune
# ============================================================

renderer:
{
    resolution = { width = 1280; height = 720; };
    samples = 64;
};

camera:
{
    position    = { x = 0.0; y = 1.8; z = -6.0; };
    fieldOfView = 75.0;
};

# ------------------------------------------------------------
#  Matériaux
# ------------------------------------------------------------
materials:
{
    lambertians = (

        # Sol — sable chaud ocre
        { name = "sand";        color = { r = 210; g = 160; b = 90;  }; },

        # Dune de fond — légèrement plus sombre
        { name = "dune_dark";   color = { r = 175; g = 120; b = 60;  }; },

        # Rocher principal — basalte brun-rouge
        { name = "rock_red";    color = { r = 140; g = 75;  b = 40;  }; },

        # Rocher secondaire — grès pâle
        { name = "rock_pale";   color = { r = 190; g = 155; b = 110; }; },

        # Petit caillou de premier plan
        { name = "pebble";      color = { r = 160; g = 110; b = 70;  }; },

        # Disque solaire — blanc chaud (éclairage géré par les lumières)
        { name = "sun_disc";    color = { r = 255; g = 220; b = 120; }; },

        # Lune — blanc bleuté
        { name = "moon";        color = { r = 200; g = 215; b = 255; }; },

        # Horizon brumeux — rose-orangé pâle
        { name = "haze";        color = { r = 255; g = 180; b = 110; }; }
    );
};

# ------------------------------------------------------------
#  Géométrie
# ------------------------------------------------------------
primitives:
{
    # --- Sol et dunes ---
    planes = (
        # Sol principal — sable plat
        {
            position = { x =  0.0; y = -1.0; z = 0.0; };
            material = "sand";
        }
    );

    spheres = (

        # ---- Éléments de décor : dunes (très grandes sphères affleurantes) ----

        # Dune gauche — émerge juste au-dessus du sol
        {
            position = { x = -12.0; y = -5.5; z = 12.0; };
            r = 7.0;
            material = "dune_dark";
        },

        # Dune droite
        {
            position = { x = 10.0; y = -6.0; z = 14.0; };
            r = 8.0;
            material = "sand";
        },

        # Dune de fond centrale (horizon)
        {
            position = { x = 2.0; y = -7.0; z = 22.0; };
            r = 9.5;
            material = "dune_dark";
        },

        # ---- Rochers ----

        # Rocher principal — gauche, gros, en bas-relief
        {
            position = { x = -2.8; y = 0.2; z = 3.5; };
            r = 1.3;
            material = "rock_red";
        },

        # Rocher secondaire — derrière et à droite
        {
            position = { x = 2.2; y = -0.1; z = 5.0; };
            r = 0.9;
            material = "rock_pale";
        },

        # Petit rocher avant-plan gauche
        {
            position = { x = -1.0; y = -0.7; z = 1.8; };
            r = 0.28;
            material = "pebble";
        },

        # Petit rocher avant-plan droit
        {
            position = { x = 1.4; y = -0.75; z = 1.5; };
            r = 0.18;
            material = "pebble";
        },

        # ---- Astres ----

        # Soleil rasant à l'horizon (très grande sphère lointaine, basse)
        {
            position = { x = -6.0; y = 1.2; z = 60.0; };
            r = 5.5;
            material = "sun_disc";
        },

        # Lune montante — droite, haute
        {
            position = { x = 7.0; y = 6.5; z = 55.0; };
            r = 2.2;
            material = "moon";
        },

        # Halo d'horizon — grande sphère floue derrière le soleil
        {
            position = { x = -4.0; y = -2.0; z = 65.0; };
            r = 14.0;
            material = "haze";
        }
    );
};

# ------------------------------------------------------------
#  Lumières
# ------------------------------------------------------------
lights:
{
    # Lumière ambiante très basse — nuit qui tombe
    ambient = 0.04;

    pointlight = (

        # Soleil rasant — lumière principale chaude, orangée
        # Position proche de l'horizon, légèrement surélevée
        {
            intensity = 2.8;
            position  = { x = -5.0; y = 2.5; z = 18.0; };
            color     = { r = 255; g = 160; b = 60; };
            constant_attenuation  = 1.0;
            linear_attenuation    = 0.012;
            quadratic_attenuation = 0.002;
        },

        # Lumière de remplissage — teinte crépusculaire rose-violet
        # Simule la lumière diffuse du ciel coloré
        {
            intensity = 0.9;
            position  = { x = 4.0; y = 8.0; z = 5.0; };
            color     = { r = 255; g = 120; b = 160; };
            constant_attenuation  = 1.0;
            linear_attenuation    = 0.02;
            quadratic_attenuation = 0.003;
        },

        # Lune — lumière froide et douce, depuis la droite haute
        {
            intensity = 0.4;
            position  = { x = 7.0; y = 9.0; z = 10.0; };
            color     = { r = 180; g = 200; b = 255; };
            constant_attenuation  = 1.0;
            linear_attenuation    = 0.03;
            quadratic_attenuation = 0.005;
        },

        # Contre-jour du soleil — reflet chaud sur le sol derrière les rochers
        {
            intensity = 0.6;
            position  = { x = -3.0; y = -0.5; z = 12.0; };
            color     = { r = 255; g = 200; b = 80; };
            constant_attenuation  = 1.0;
            linear_attenuation    = 0.08;
            quadratic_attenuation = 0.01;
        }
    );
};
