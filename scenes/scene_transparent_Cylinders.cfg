renderer:
{
    resolution = { width = 800; height = 600; };
    samples = 50;
    maxDepth = 12;
    background = "sky";
};

camera:
{
    position = { x = 0.0; y = 1.0; z = -3.5; };
    rotation = { x = 5.0; y = 0.0; z = 0.0; };
    fieldOfView = 70;
};

materials:
{
    lambertian = (
        { name = "floor"; color = { r = 215; g = 215; b = 20; }; }
    );

    refractive = (
        {
            name = "glass_red";
            color = { r = 255; g = 80;  b = 60;  };
            transparency = 0.95;
            refractiveIndex = 1.5;
        },
        {
            name = "glass_green";
            color = { r = 80;  g = 220; b = 120; };
            transparency = 0.95;
            refractiveIndex = 1.5;
        },
        {
            name = "glass_clear";
            color = { r = 255; g = 255; b = 255; };
            transparency = 1.0;
            refractiveIndex = 1.45;
        }
    );

    texture = (
        {
            name = "sky";
            filepath = "texture/sky.jpg";
        }
    );
};

primitives:
{
    planes = (
        {
            position = { x = 0.0; y = -1.5; z = 0.0; };
            material = "floor";
        }
    );

    cylinders = (
        {
            position = { x = -2.0; y = -1.5; z = 5.0; };
            r = 0.5;
            h = 3.5;
            material = "glass_red";
        },
        {
            position = { x = 0.5; y = -1.5; z = 4.5; };
            r = 0.5;
            h = 2.5;
            material = "glass_clear";
        },
        {
            position = { x = 2.8; y = -1.5; z = 5.5; };
            r = 0.5;
            h = 4.0;
            material = "glass_green";
        }
    );
};

lights:
{
    ambient = 0.08;

    directional = (
        {
            direction = { x = 0.0; y = 1.5; z = -1.0; };
            intensity = 1.0;
            color = { r = 255; g = 255; b = 255; };
        },
        {
            direction = { x = 1.0; y = 0.5; z = -0.3; };
            intensity = 0.5;
            color = { r = 255; g = 200; b = 100; };
        }
    );
};