renderer:
{
    resolution = { width = 600; height = 600; };
    samples = 50;
    maxDepth = 5;
    background = "sky";
};

camera:
{
    position = { x = 0.0; y = 2.0; z = -5.0; };
    rotation = { x = 10.0; y = 0.0; z = 0.0; };
    fieldOfView = 80;
};

materials:
{
    lambertians = (
        { name = "floor";   color = { r = 30;  g = 30;  b = 30;  }; },
        { name = "white";   color = { r = 255; g = 255; b = 255; }; },
        { name = "gold";    color = { r = 255; g = 200; b = 50;  }; },
        { name = "crimson"; color = { r = 180; g = 20;  b = 20;  }; },
        { name = "teal";    color = { r = 20;  g = 180; b = 160; }; }
    );

    refractives = (
        {
            name = "glass";
            color = { r = 255; g = 255; b = 255; };
            transparency = 1.0;
            refractiveIndex = 1;
        },
        {
            name = "blue_glass";
            color = { r = 100; g = 180; b = 255; };
            transparency = 0.85;
            refractiveIndex = 1.3;
        }
    );

    textures = (
        {
            name = "sky";
            filepath = "texture/sky.jpg";
        },
        {
            name = "grunge_floor";
            filepath = "texture/grunge.jpg";
        }
    );
};

