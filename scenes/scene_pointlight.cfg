renderer:
{
    resolution = { width = 800; height = 600; };
    samples = 100;
    maxDepth = 10;
};

camera:
{
    position = { x = 0.0; y = 2.0; z = -8.0; };
    rotation = { x = 5.0; y = 0.0; z = 0.0; };
    fieldOfView = 75.0;
};

materials:
{
    lambertians = (
        {
            name = "white_wall";
            color = { r = 200; g = 200; b = 200; };
        },
        {
            name = "red_wall";
            color = { r = 200; g = 50; b = 50; };
        },
        {
            name = "blue_wall";
            color = { r = 50; g = 50; b = 200; };
        },
        {
            name = "grey_floor";
            color = { r = 128; g = 128; b = 128; };
        },
        {
            name = "dark_sphere";
            color = { r = 30; g = 30; b = 30; };
        }
    );

    reflectives = (
        {
            name = "mirror";
            reflectiveIndex = 0.8;
        }
    );
};

primitives:
{
    planes = (
        # Floor
        {
            position = { x = 0.0; y = 0.0; z = 0.0; };
            material = "grey_floor";
        },
        # Back wall
        {
            position = { x = 0.0; y = 0.0; z = 10.0; };
            rotation = { x = 90.0; y = 0.0; z = 0.0; };
            material = "white_wall";
        },
        # Left wall (red)
        {
            position = { x = -6.0; y = 0.0; z = 0.0; };
            rotation = { x = 0.0; y = 0.0; z = 90.0; };
            material = "red_wall";
        },
        # Right wall (blue)
        {
            position = { x = 6.0; y = 0.0; z = 0.0; };
            rotation = { x = 0.0; y = 0.0; z = 90.0; };
            material = "blue_wall";
        }
    );

    spheres = (
        # Center sphere (dark, to show lighting)
        {
            position = { x = 0.0; y = 1.0; z = 1.0; };
            r = 0.8;
            material = "dark_sphere";
        },
        # Reflective sphere (show shadow casting)
        {
            position = { x = 2.5; y = 0.8; z = 2.0; };
            r = 0.6;
            material = "mirror";
        }
    );
};

lights:
{
    ambient = 0.05; # Very low ambient to see point lights clearly

    # Main warm point light (upper left)
    pointlight = (
        {
            intensity = 1.5;
            position = { x = -3.0; y = 3.0; z = -1.0; };
            color = { r = 255; g = 200; b = 100; }; # Warm yellow-orange light
            constant_attenuation = 1.0;
            linear_attenuation = 0.09;
            quadratic_attenuation = 0.032;
        },
        # Cool blue point light (upper right)
        {
            intensity = 1.2;
            position = { x = 3.0; y = 3.5; z = -1.0; };
            color = { r = 100; g = 150; b = 255; }; # Cool blue light
            constant_attenuation = 1.0;
            linear_attenuation = 0.09;
            quadratic_attenuation = 0.032;
        },
        # Middle point light with tighter falloff (red light)
        {
            intensity = 2.0;
            position = { x = 0.0; y = 1.5; z = 3.0; };
            color = { r = 255; g = 80; b = 80; }; # Red light
            constant_attenuation = 1.0;
            linear_attenuation = 0.15;
            quadratic_attenuation = 0.05;
            radius = 8.0;
        }
    );

    directionals = (
        # Soft directional fill light
        {
            intensity = 0.3;
            direction = { x = 1.0; y = -1.0; z = 1.0; };
            color = { r = 200; g = 200; b = 200; };
        }
    );
};
