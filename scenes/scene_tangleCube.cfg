renderer:
{
    resolution = { width = 1000; height = 800; };
    background = "space2";
    samples = 8;
};

camera:
{
    position = { x = 0.0; y = 0; z = 0; };
    rotation = { x = 0; y = 0; z = 0; };
    fieldOfView = 90.0;
};

materials:
{
    lambertians = (
        { name = "mat_255_255_255"; color = { r = 255; g = 255; b = 255; }; }
    );

    reflectives = (
        {
            name = "glass";
            reflectiveIndex = 1;
        }
    )

    textures = (
        { name = "space2"; filepath = "texture/space2.jpg"; },
    );
};

primitives:
{
    tanglecubes = (
        {
            position = { x = 0; y = 0; z = 5 };
            rotation = { x = 0; y = 160; z = 0 };
            scale    = 0.8;
            constant = 11.8;   // [0..15] environ, 11.8 = forme classique
            material = "mat_255_255_255";
        }
    );
};

lights:
{
    ambient = 0.3;

    directionals = (
        {
            direction = { x = -0.4; y = -0.4; z = 0.8; };
            color = { r = 255; g = 0; b = 0; };
            intensity = 1;
        }
    );
};  