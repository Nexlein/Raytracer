renderer:
{
    resolution = { width = 800; height = 600; };
    samples = 15;
    maxDepth = 5;
    background = "night";
};

camera:
{
    position = { x = 0.0; y = 6.0; z = -6.0; };
    rotation = { x = 30.0; y = 0.0; z = 0.0; };
    fieldOfView = 75;
};

materials:
{
    lambertian = (
        { name = "pedestal";  color = { r = 80;  g = 55;  b = 65;  }; },
        { name = "red";       color = { r = 230; g = 50;  b = 50;  }; },
        { name = "green";     color = { r = 50;  g = 210; b = 70;  }; },
        { name = "blue";      color = { r = 50;  g = 80;  b = 220; }; },
        { name = "magenta";   color = { r = 240; g = 40;  b = 210; }; },
        { name = "cyan";      color = { r = 40;  g = 210; b = 210; }; },
        { name = "yellow";    color = { r = 240; g = 210; b = 20;  }; },
        { name = "orange";    color = { r = 240; g = 130; b = 20;  }; },
        { name = "white";     color = { r = 240; g = 240; b = 240; }; },
        { name = "pink";      color = { r = 240; g = 150; b = 170; }; },
        { name = "purple";    color = { r = 140; g = 50;  b = 240; }; },
        { name = "teal";      color = { r = 20;  g = 170; b = 150; }; },
        { name = "darkblue";  color = { r = 30;  g = 30;  b = 160; }; }
    );

    refractive = (
        {
            name = "glass";
            color = { r = 255; g = 255; b = 255; };
            transparency = 1.0;
            refractiveIndex = 1.5;
        },
        {
            name = "glass_red";
            color = { r = 255; g = 80; b = 60; };
            transparency = 0.9;
            refractiveIndex = 1.5;
        },
        {
            name = "glass_blue";
            color = { r = 100; g = 150; b = 255; };
            transparency = 1.0;
            refractiveIndex = 1.4;
        }
    );

    texture = (
        {
            name = "night";
            filepath = "texture/night.jpg";
        }
    );
};

